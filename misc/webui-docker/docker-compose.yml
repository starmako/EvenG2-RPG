services:
  landing:
    build:
      context: ../..
      dockerfile: misc/webui-docker/Dockerfile
      args:
        PREFETCH_REGISTRY_APPS: "0"
    image: even-dev-webui:local
    environment:
      WEBUI_MODE: landing
      LANDING_PORT: 8080
      PORT: 5173
    ports:
      - "8080:8080"
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - even_dev_workspace:/workspace/even-dev
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  editor:
    image: even-dev-webui:local
    depends_on:
      landing:
        condition: service_healthy
    environment:
      WEBUI_MODE: editor
      EDITOR_PORT: 5174
    ports:
      - "5174:5174"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - even_dev_workspace:/workspace/even-dev
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5174').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  even_dev_workspace:
