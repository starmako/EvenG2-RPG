<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EvenG2</title>
  <!--<link rel="stylesheet" href="./src/styles.css">-->
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <div class="app">
    <main class="main">
      <h1>Phaseを選択</h1>

      <select id="phaseSelect" class="phase-select">
        <option value="1">Phase 1</option>
      </select>

      <h2 id="phaseTitle">Phase 1 Sentences</h2>

      <ul id="sentenceList" class="sentence-list"></ul>

      <section class="current-card">
        <p class="current-label">現在の文章</p>
        <p id="currentText" class="current-text"></p>
      </section>

      <section class="audio-card">
        <audio id="audioPlayer"></audio>

        <div class="audio-controls">
          <button id="prevButton">⏮</button>
          <button id="playButton">▶</button>
          <button id="stopButton">■</button>
          <button id="nextButton">⏭</button>

          <label>
            ループ再生
            <input id="loopToggle" type="checkbox">
          </label>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
